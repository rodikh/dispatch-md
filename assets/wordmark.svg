<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 468 160" width="468" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#111C35"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="468" height="160" rx="36" fill="url(#bg)"/>

  <!-- Icon — scaled down to fit the lockup height -->
  <!-- Chevron -->
  <path d="M 38 52 L 80 80 L 38 108"
        fill="none" stroke="#F8FAFC" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot — baseline aligned (bottom of chevron) -->
  <circle cx="102" cy="108" r="8.5" fill="#60A5FA" filter="url(#glow)"/>

  <!-- Divider -->
  <line x1="136" y1="44" x2="136" y2="116"
        stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- Wordmark: single text element so .md flows directly after dispatch -->
  <text x="162" y="95"
        font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="42" font-weight="500" letter-spacing="-0.5">
    <tspan fill="#F8FAFC">dispatch</tspan><tspan fill="#60A5FA">.md</tspan>
  </text>
</svg>
